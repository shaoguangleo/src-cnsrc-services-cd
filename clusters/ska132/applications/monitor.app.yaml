apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: monitor
spec:
  syncPolicy:
    syncOptions:
      - CreateNamespace=true
  destination:
    namespace: argocd
    server: https://kubernetes.default.svc
  project: default
  sources:
    - path: clusters/ska132/applications/monitor
      repoURL: https://gitlab.com/ska-telescope/src/deployments/cnsrc/ska-src-cnsrc-services-cd.git
      targetRevision: main
