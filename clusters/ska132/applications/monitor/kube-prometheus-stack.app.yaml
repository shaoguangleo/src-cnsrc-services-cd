---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: kube-prometheus-stack
spec:
  syncPolicy:
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
  project: default
  destination:
    server: https://kubernetes.default.svc
    namespace: monitor
  sources:
    - repoURL: https://prometheus-community.github.io/helm-charts
      chart: kube-prometheus-stack
      targetRevision: 75.7.0
      helm:
        releaseName: kube-prometheus-stack
        valuesObject:
          crds:
            enabled: true
          alertmanager:
            enabled: true
            alertmanagerSpec:
              image:
                registry: m.daocloud.io/quay.io
              retention: 120h
              storage:
                volumeClaimTemplate:
                  spec:
                    storageClassName: "nfs-external-nas"
                    accessModes: ["ReadWriteOnce"]
                    resources:
                      requests:
                        storage: 10Gi
          prometheusOperator:
            enabled: true
            admissionWebhooks:
              deployment:
                image:
                  registry: m.daocloud.io/quay.io
              patch:
                image:
                  registry: m.daocloud.io/registry.k8s.io
            image:
              registry: m.daocloud.io/quay.io
            prometheusConfigReloader:
              image:
                registry: m.daocloud.io/quay.io
            thanosImage:
              registry: m.daocloud.io/quay.io
          grafana:
            enabled: true
            image:
              registry: m.daocloud.io/docker.io
            admin:
              existingSecret: "kube-prometheus-grafana-credentials"
              userKey: admin-user
              passwordKey: admin-password
            ingress:
              enabled: true
              annotations:
                kubernetes.io/ingress.class: nginx
                cert-manager.io/cluster-issuer: alidns-webhook-zverse-letsencrypt
              hosts:
                - grafana.ska.zverse.space
              tls:
                - secretName: grafana.ska.zverse.space-tls
                  hosts:
                  - grafana.ska.zverse.space
            testFramework:
              image:
                registry: m.daocloud.io/docker.io
            downloadDashboardsImage:
              registry: m.daocloud.io/docker.io
            initChownData:
              image:
                registry: m.daocloud.io/docker.io
            sidecar:
              image:
                registry: m.daocloud.io/quay.io
            imageRenderer:
              enabled: false
              image:
                registry: m.daocloud.io/docker.io
          thanosRuler:
            enabled: false
            thanosRulerSpec:
              image:
                registry: m.daocloud.io/quay.io
          prometheus:
            ingress:
              enabled: false
            prometheusSpec:
              image:
                registry: m.daocloud.io/quay.io
              storageSpec:
                volumeClaimTemplate:
                  spec:
                    storageClassName: "nfs-external-nas"
                    accessModes: ["ReadWriteOnce"]
                    resources:
                      requests:
                        storage: 100Gi
          kube-state-metrics:
            image:
              registry: m.daocloud.io/registry.k8s.io
            kubeRBACProxy:
              image:
                registry: m.daocloud.io/quay.io
