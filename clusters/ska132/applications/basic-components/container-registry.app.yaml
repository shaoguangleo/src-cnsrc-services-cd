apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: container-registry
spec:
  syncPolicy:
    syncOptions:
      - CreateNamespace=true
  project: default
  destination:
    server: https://kubernetes.default.svc
    namespace: basic-components
  sources:
    - repoURL: https://helm.twun.io
      chart: docker-registry
      targetRevision: 2.2.3
      helm:
        releaseName: container-registry
        valuesObject:
          image:
            repository: m.daocloud.io/docker.io/library/registry
          storage: filesystem
          persistence:
            enabled: true
            storageClass: nfs-external-nas
            size: 300Gi
          ingress:
            enabled: true
            className: nginx
            annotations:
              cert-manager.io/cluster-issuer: alidns-webhook-zverse-letsencrypt
              nginx.ingress.kubernetes.io/proxy-body-size: "1024m"
            hosts:
              - container-registry.internal.ska.zverse.space
            tls:
              - secretName: container-registry.internal.ska.zverse.space-tls
                hosts:
                  - container-registry.internal.ska.zverse.space
  