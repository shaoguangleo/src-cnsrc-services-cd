hub:
  config:
    Authenticator:
      enable_auth_state: true
      allow_all: true
    GenericOAuthenticator:
      login_service: "Jupyterhub"
      client_id: 8dc3c26c-0fef-4138-8c5f-7d2d23e470ec
      client_secret: xxxxxx
      authorize_url: https://ska-iam.stfc.ac.uk/authorize
      token_url: https://ska-iam.stfc.ac.uk/token
      userdata_url: https://ska-iam.stfc.ac.uk/userinfo
      scope:
        - openid
        - profile
        - email
        - offline_access
      userdata_token_method: GET
      userdata_params: { "state": "state" }
      username_key: preferred_username
    JupyterHub:
      authenticator_class: generic-oauth
  baseUrl: /
  db:
    pvc:
      storageClassName: nfs-client
singleuser:
  memory:
    limit: 8G
    guarantee: 8G
  cpu:
    limit: 4
    guarantee: 4
  storage:
    dynamic:
      storageClass: nfs-client
      capacity: 200Gi
  defaultUrl: "/lab"
  extraEnv:
    JUPYTERHUB_SINGLEUSER_APP: "jupyter_server.serverapp.ServerApp"
  image:
    name: m.daocloud.io/docker.io/jupyter/minimal-notebook
    tag: latest
  profileList:
  - display_name: "Minimal environment"
    description: "A Python environment."
    default: true
  - display_name: "Data science environment"
    description: "Python, R and Julia environments."
    kubespawner_override:
      image: m.daocloud.io/docker.io/jupyter/datascience-notebook:latest

