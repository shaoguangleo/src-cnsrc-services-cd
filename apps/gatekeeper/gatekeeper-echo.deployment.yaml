---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ska-src-gatekeeper-echo
  namespace: gatekeeper
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: ska-src-gatekeeper-echo
  template:
    metadata:
      labels:
        app.kubernetes.io/name: ska-src-gatekeeper-echo
    spec:
      securityContext:
        seccompProfile:
          type: RuntimeDefault
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
      containers:
        - name: main
          image: harbor.srcdev.skao.int/ska-src-dm-da-service-gatekeeper/service-gatekeeper-echo:1.0.1
          imagePullPolicy: IfNotPresent
          env:
            - name: TZ
              value: Asia/Shanghai
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
