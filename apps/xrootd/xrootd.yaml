            defaultMode: 256
        - name: volume-1732606998124
          configMap:
            name: xrootd-checksum
            defaultMode: 511
      initContainers:
        - name: install-certs
          image: m.daocloud.io/docker.io/library/rockylinux:9
          command:
            - /bin/bash
            - '-c'
            - >
              # Install Grid certificates. These are not needed for XrdHttp, but
              populating

              # /etc/grid-security/certificates seem to be needed for xroot/1094
              to operate.

              yum install -y
              https://repo.opensciencegrid.org/osg/3.6/osg-3.6-el9-release-latest.rpm

              yum install -y osg-ca-certs

              # Create and set permissions for necessary directories

              mkdir -p /var/spool/xrootd /run/xrootd

              chown -R 994:994 /var/spool/xrootd /run/xrootd /data

              # Kubernetes always symlinks secrets, and xrootd seems to check
              the file permissions.

              # Understandably, this results in xrootd checking the permissions
              of a link.

              # Kubernetes can not handle this scenario, so we have to copy the
              secrets during

              # the initialisation from the secret volume (tls-secrets) over to
              a directory (tls-certs).

              cp /etc/grid-security/tls-secrets/tls.crt
              /etc/grid-security/xrd/tls.crt

              cp /etc/grid-security/tls-secrets/tls.key
              /etc/grid-security/xrd/tls.key


              chmod 600 /etc/grid-security/xrd/tls.key

              chown 994 /etc/grid-security/xrd/tls.key
              /etc/grid-security/xrd/tls.crt

              ls -al /data
          resources: {}
          volumeMounts:
