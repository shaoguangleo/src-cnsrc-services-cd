            - name: tls-secrets
              mountPath: /etc/grid-security/tls-secrets/
            - name: tls-certs
              mountPath: /etc/grid-security/xrd/
          terminationMessagePath: /dev/termination-log
          terminationMessagePolicy: File
          imagePullPolicy: Always
          securityContext:
            privileged: false
            runAsUser: 0
            runAsGroup: 0
      containers:
